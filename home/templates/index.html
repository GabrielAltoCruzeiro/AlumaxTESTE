{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumax - Chamados TI</title>
    <!--link para bootstrap-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- link para pasta static com logo-->
    <link rel="icon" href="{% static 'home/almlogo.png' %}">
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #0a1628;
        --navy-mid: #0f2040;
        --navy-light: #162d55;
        --accent: #3a7bd5;
        --accent-bright: #5b9cf6;
        --text-muted: #8fa3c0;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--navy);
        color: #fff;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ── NAVBAR ── */
      .site-navbar {
        background-color: var(--navy);
        border-bottom: 1px solid var(--border);
        padding: 18px 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .site-navbar .logo {
        height: 50px;
        transition: all .35s ease;
        cursor: pointer;
       

        
      }

      .logo:hover {
            transform: scale(1.06) translateY(-3px);
            filter: drop-shadow(0 40px 60px ,var(--accent-bright));
        
      }

      .site-navbar .nav-link {
        color: rgba(255, 255, 255, 0.75) !important;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 6px 14px !important;
        transition: color 0.2s;
      }

      .site-navbar .nav-link:hover {
        color: #fff !important;
      }

      .site-navbar .btn-contact {
        background: var(--accent);
        color: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        padding: 8px 20px;
        transition: background 0.2s;
      }

      .site-navbar .btn-contact:hover {
        background: var(--accent-bright);
      }

      /* ── HERO ── */
      .hero {
        background: linear-gradient(
          135deg,
          var(--navy) 0%,
          var(--navy-mid) 60%,
          #0d1f3c 100%
        );
        padding: 10px 0 20px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 60% 50% at 50% 0%,
          rgba(58, 123, 213, 0.18) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .hero-eyebrow {
        display: inline-block;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent-bright);
        background: rgba(91, 156, 246, 0.12);
        border: 1px solid rgba(91, 156, 246, 0.25);
        border-radius: 100px;
        padding: 5px 16px;
        margin-bottom: 22px;
      }

      /* ── FORM SECTION ── */
      .form-section {
        flex: 1;
        padding: 60px 0 80px;
      }

      .form-card {
        background: var(--navy-mid);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 48px 44px;
        max-width: 680px;
        margin: 0 auto;
      }

      .form-card h2 {
        font-size: 1.35rem;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .form-card .subtitle {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 36px;
      }

      .form-label {
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .form-control,
      .form-select {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        color: #fff;
        font-size: 0.9rem;
        padding: 11px 14px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .form-control:focus,
      .form-select:focus {
        background: rgba(255, 255, 255, 0.07);
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.2);
        color: #fff;
        outline: none;
      }

      .form-control::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      textarea.form-control {
        resize: vertical;
        min-height: 130px;
      }

      .form-select option {
        background: var(--navy-mid);
        color: #fff;
      }

      .btn-submit {
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
        border: none;
        border-radius: 8px;
        padding: 13px 36px;
        width: 100%;
        margin-top: 8px;
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .btn-submit:hover {
        background: var(--accent-bright);
        transform: translateY(-1px);
      }

      /* ── INFO CARDS ── */
      .info-section {
        padding: 0 0 80px;
      }

      .info-card {
        background: var(--navy-mid);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px 26px;
        height: 100%;
      }

      .info-card .icon {
        width: 42px;
        height: 42px;
        background: rgba(91, 156, 246, 0.12);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
      }

      .info-card .icon svg {
        width: 20px;
        height: 20px;
        stroke: var(--accent-bright);
        fill: none;
        stroke-width: 1.8;
      }

      .info-card h6 {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .info-card p {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.85);
        margin: 0;
        line-height: 1.6;
      }

      /* ── FOOTER ── */
      .site-footer {
        background: #060e1c;
        border-top: 1px solid var(--border);
        padding: 52px 0 30px;
      }

      .site-footer .logo {
        height: 34px;
        filter: brightness(0) invert(1);
        margin-bottom: 18px;
      }

      .site-footer .footer-desc {
        color: var(--text-muted);
        font-size: 0.85rem;
        line-height: 1.7;
        max-width: 260px;
      }

      .site-footer .footer-heading {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 16px;
      }

      .site-footer .footer-link {
        display: block;
        color: rgba(255, 255, 255, 0.65);
        text-decoration: none;
        font-size: 0.875rem;
        margin-bottom: 10px;
        transition: color 0.2s;
      }

      .site-footer .footer-link:hover {
        color: #fff;
      }

      .site-footer .social-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid var(--border);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-right: 8px;
        transition: background 0.2s;
        text-decoration: none;
      }

      .site-footer .social-btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .site-footer .social-btn svg {
        width: 16px;
        height: 16px;
        fill: #fff;
      }

      .footer-bottom {
        border-top: 1px solid var(--border);
        margin-top: 40px;
        padding-top: 24px;
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      @media (max-width: 576px) {
        .form-card {
          padding: 30px 22px;
        }
        .hero {
          padding: 60px 0 50px;
        }
      }
    </style>
  </head>
  <body>
    <!-- barra de navegação -->
    <nav class="site-navbar">
      <div class="container d-flex align-items-center justify-content-center">
        <a href="#">
          <!-- Logo alumax -->
          <img src="{% static 'home/almlogo.png' %}" alt="Alumax Logo1" class="logo" />
        </a>                       

        
        <!--Barra de navegação do site -->
        <div
          class="collapse navbar-collapse d-lg-flex justify-content-end align-items-center gap-1"
          id="navMenu"
        >
          <a href="#" class="nav-link">Chamados abertos   { opção ainda em desenvolvimento pela equipe de TI } </a>
        </div>
      </div>
    </nav>

    
    <section class="hero">
      <div class="container position-relative pt-3 pb-0">
        <div class="hero-eyebrow ">Entre em contato com nosso suporte</div>
      </div>
    </section>

    <!-- campo do formulario-->
    <section class="form-section">
      <div class="container">
        <div class="form-card">
          <h2>Alumax - Chamados TI</h2>

          <form action='/home/' method="POST"  enctype="multipart/form-data">
              {% csrf_token %}

           <div class="row g-3">
              <div class="col-sm-6">
                <label class="form-label">Nome:</label>
                <input
                  type="text"
                  class="form-control"
                  name="nomeUsuario"
                  placeholder="Seu nome"
                />
              </div>
              <div class="col-12">
                <label class="form-label">Email:</label>
                <input
                  type="email"
                  class="form-control"
                  name="emailUsuario"
                  placeholder="seuEmail@exemplo.com"
                />
              </div>
              <div class="col-12">
                <label class="form-label">Setor:</label>
                <input
                  type="text"
                  class="form-control"
                  name="setorUsuario"
                  placeholder="Ex: RH, Comercial, Financeiro ..."
                />
              </div>
              <div class="col-12">
                <label class="form-label">Suporte:</label>
                <select class="form-select" name="suporteUsuario">
                  <option value="" disabled selected>
                    Selecione Suporte:
                  </option>
                  <option>Infraestrutura</option>
                  <option>Sistema</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Categoria:</label>
                <select class="form-select" name="categoriaUsuario">
                  <option value="" disabled selected>Problema:</option>
                  <option>Hardware</option>
                  <option>Software</option>
                  <option>Rede(internet)</option>
                  <option>Impressora</option>
                  <option>Acesso</option>
                  <option>Outro</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Detalhe:</label>
                <textarea
                  class="form-control"
                  name="detalheUsuario"
                  placeholder="Escreva brevemente sobre o problema..."
                ></textarea>
              </div>
              
              <div class="mb-3">
                   <label for="formFile" class="form-label">Enviar uma Imagem  { opção ainda em desenvolvimento pela equipe de TI } </label>
                   <input class="form-control" type="file" name="arquivoUsuario" id="formFile" accept="image/*">
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-submit">
                  Enviar Chamado
                </button>
              </div>
          
          </form>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
