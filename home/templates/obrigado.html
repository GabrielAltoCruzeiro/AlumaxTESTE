{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumax - Obrigado pelo seu Contato</title>
    <link rel="icon" href="{% static 'home/almlogo.png' %}">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #0a1628;
        --navy-mid: #0f2040;
        --navy-light: #162d55;
        --accent: #3a7bd5;
        --accent-bright: #5b9cf6;
        --text-muted: #8fa3c0;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--navy);
        color: #fff;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ── NAVBAR ── */
      .site-navbar {
        background-color: var(--navy);
        border-bottom: 1px solid var(--border);
        padding: 18px 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .site-navbar .logo {
        height: 50px;
        
      }

      .site-navbar .nav-link {
        color: rgba(255, 255, 255, 0.75) !important;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 6px 14px !important;
        transition: color 0.2s;
      }

      .site-navbar .nav-link:hover {
        color: #fff !important;
      }

      .site-navbar .btn-contact {
        background: var(--accent);
        color: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        padding: 8px 20px;
        transition: background 0.2s;
      }

      .site-navbar .btn-contact:hover {
        background: var(--accent-bright);
      }

      @media (max-width: 576px) {
        .form-card {
          padding: 30px 22px;
        }
        .hero {
          padding: 60px 0 50px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR --> 
    <nav class="site-navbar">
      <div class="container d-flex align-items-center justify-content-between">
        <a href="#">
          <!-- Placeholder logo — replace src with real logo -->
        <img src="{% static 'home/almlogo.png' %}" alt="Alumax Logo1" class="logo" />
        </a>

        
        <div
          class="collapse navbar-collapse d-lg-flex justify-content-end align-items-center gap-1"
          id="navMenu" 
        >
          <a href="#" class="nav-link">Chamados Abertos</a>
        </div>
      </div>
    </nav>
        </div>
      </div>
       <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="text-center">
          <h1 class="mb-4">Obrigado!</h1>
          <p class="mb-4">Seu chamado foi enviado com sucesso.</p>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
